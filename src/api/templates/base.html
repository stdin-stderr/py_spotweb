<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Spotnet Index{% endblock %}</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      padding: 0;
      margin: 0;
      display: flex;
      background-color: #fafafa;
      color: #333;
    }
    a {
      color: #0066cc;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
    .search-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 1.5em;
    }
    .filter-sidebar {
      width: 320px;
      border-right: 1px solid #ddd;
      padding: 1.5em;
      background: #f5f5f5;
      overflow-y: auto;
      max-height: 100vh;
    }
    .sidebar-title {
      margin: 0 0 1.5em 0;
      font-size: 16px;
      font-weight: 600;
      color: #333;
    }
    .head-category {
      margin-bottom: 1.5em;
    }
    .head-category-toggle {
      cursor: pointer;
      margin: 0;
      padding: 0.5em 0;
      font-size: 14px;
      font-weight: 500;
      user-select: none;
      border: none;
      background: none;
      text-align: left;
      color: #333;
      width: 100%;
    }
    .head-category-toggle:hover {
      color: #0066cc;
    }
    .toggle-icon {
      display: inline-block;
      width: 12px;
      text-align: center;
      margin-right: 6px;
      font-size: 12px;
    }
    .subfilter-sections {
      margin-left: 0;
      transition: all 0.2s ease;
    }
    .subfilter-section {
      margin-bottom: 1em;
    }
    .subfilter-label {
      margin: 0.7em 0 0.4em 0;
      padding: 0;
      font-size: 11px;
      font-weight: 600;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .filter-items {
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .filter-item {
      margin: 0.2em 0;
      position: relative;
    }
    .filter-link {
      display: flex;
      justify-content: space-between;
      padding: 4px 6px;
      text-decoration: none;
      color: #0066cc;
      font-size: 13px;
      width: 100%;
      border-radius: 3px;
      transition: all 0.15s ease;
    }
    .filter-link:hover {
      background: #e8f0ff;
    }
    .filter-item.active .filter-link {
      background: #0066cc;
      color: white;
      font-weight: 500;
    }
    .filter-item.active .filter-link:hover {
      background: #0052a3;
    }
    .filter-clear {
      position: absolute;
      right: 4px;
      top: 4px;
      color: #999;
      text-decoration: none;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      padding: 2px 4px;
    }
    .filter-clear:hover {
      color: #f00;
    }
    .filter-item.active .filter-clear {
      color: #ccc;
    }
    .count {
      color: #999;
      font-size: 12px;
      font-weight: 500;
    }
    .filter-item.active .count {
      color: #ccc;
    }
    h1, h2, h3 {
      margin-top: 0;
    }
    .search-form {
      display: flex;
      gap: 0.5em;
      margin-bottom: 1.5em;
      flex-wrap: wrap;
    }
    .search-form input,
    .search-form select,
    .search-form button {
      font-size: 14px;
      padding: 0.5em 0.75em;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-family: inherit;
    }
    .search-form input {
      flex: 1;
      min-width: 200px;
    }
    .search-form button {
      background: #0066cc;
      color: white;
      cursor: pointer;
      border: none;
      font-weight: 500;
    }
    .search-form button:hover {
      background: #0052a3;
    }
    .search-form select {
      background: white;
    }
    .results-info {
      margin: 0.5em 0 1em 0;
      font-size: 13px;
      color: #666;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      background: white;
      border-radius: 4px;
      overflow: hidden;
    }
    th {
      background: #f9f9f9;
      border-bottom: 2px solid #ddd;
      padding: 0.75em;
      text-align: left;
      font-weight: 600;
      font-size: 13px;
      color: #333;
    }
    td {
      border-bottom: 1px solid #eee;
      padding: 0.75em;
      font-size: 13px;
      vertical-align: middle;
    }
    tr:nth-child(even) {
      background: #fafafa;
    }
    tr:hover {
      background-color: rgba(0, 102, 204, 0.05);
    }
    .pagination {
      margin: 1.5em 0 0 0;
      display: flex;
      gap: 0.3em;
    }
    .pagination a {
      padding: 0.4em 0.6em;
      border: 1px solid #ddd;
      border-radius: 3px;
      font-size: 12px;
      display: inline-block;
    }
    .pagination a:hover {
      background: #f0f0f0;
      text-decoration: none;
    }
    .pagination .active {
      background: #0066cc;
      color: white;
      border-color: #0066cc;
      padding: 0.4em 0.6em;
      border: 1px solid #0066cc;
      border-radius: 3px;
      font-size: 12px;
      display: inline-block;
    }
    .pagination .gap {
      padding: 0.4em 0.3em;
      font-size: 12px;
      color: #999;
    }
    img {
      border-radius: 3px;
      max-width: 100%;
      height: auto;
    }
    .release-header {
      display: flex;
      gap: 2em;
      margin-bottom: 2em;
    }
    .release-image {
      flex-shrink: 0;
    }
    .release-image img {
      width: 180px;
      height: auto;
    }
    .release-info {
      flex: 1;
    }
    .release-title {
      margin: 0 0 1em 0;
      font-size: 20px;
      font-weight: 600;
    }
    .release-meta {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 0.5em 1em;
      font-size: 13px;
      margin-bottom: 1em;
    }
    .release-meta-label {
      font-weight: 500;
      color: #666;
    }
    .release-meta-value {
      color: #333;
    }
    .metadata-table {
      margin: 1.5em 0;
      border: 1px solid #ddd;
      border-radius: 4px;
      overflow: hidden;
    }
    .metadata-table tr {
      display: flex;
    }
    .metadata-table td {
      border: none;
      border-bottom: 1px solid #eee;
      flex: 1;
      padding: 0.7em;
    }
    .metadata-table td:first-child {
      font-weight: 500;
      background: #f9f9f9;
      width: 120px;
      flex: 0 0 120px;
    }
    .metadata-table tr:last-child td {
      border-bottom: none;
    }
    .description {
      margin: 1.5em 0;
      white-space: pre-wrap;
      font-size: 13px;
      line-height: 1.5;
      color: #333;
      background: #f9f9f9;
      padding: 1em;
      border-radius: 4px;
    }
    .badge {
      display: inline-block;
      padding: 0.3em 0.6em;
      background: #f0f0f0;
      border-radius: 3px;
      font-size: 11px;
      font-weight: 500;
      margin-right: 0.5em;
      margin-bottom: 0.5em;
    }
    .badge.available {
      background: #e8f5e9;
      color: #2e7d32;
    }
    .badge.unavailable {
      background: #ffebee;
      color: #c62828;
    }
    .badge.verified {
      background: #e3f2fd;
      color: #1565c0;
    }
    .badge.unverified {
      background: #fff3e0;
      color: #e65100;
    }
    .actions {
      margin-top: 1.5em;
      display: flex;
      gap: 0.5em;
    }
    .actions a, .actions button {
      padding: 0.75em 1.5em;
      background: #0066cc;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
      text-decoration: none;
      font-weight: 500;
    }
    .actions a:hover, .actions button:hover {
      background: #0052a3;
      text-decoration: none;
    }
    @media (max-width: 768px) {
      body {
        flex-direction: column;
      }
      .filter-sidebar {
        width: 100%;
        max-height: none;
        border-right: none;
        border-bottom: 1px solid #ddd;
      }
      .release-header {
        flex-direction: column;
      }
    }
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>
  {% block body %}{% endblock %}
</body>
</html>
