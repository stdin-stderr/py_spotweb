services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: usenet_index
      POSTGRES_USER: indexer
      POSTGRES_PASSWORD: secret
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U indexer -d usenet_index"]
      interval: 5s
      timeout: 5s
      retries: 10

  scanner:
    build: .
    command: python -m src.scanner.main
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  api:
    build: .
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8080
    env_file: .env
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  matcher:
    build: .
    command: python -m src.matcher.main
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
